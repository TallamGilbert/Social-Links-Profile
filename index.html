<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Links Profile</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: hsl(0, 0%, 8%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .profile-card {
      background-color: hsl(0, 0%, 15%);
      border-radius: 16px;
      width: 320px;
      padding: 40px 24px;
      text-align: center;
    }

    .profile-card__avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin-bottom: 16px;
    }

    .profile-card__name {
      font-size: 1.4rem;
      font-weight: 700;
      color: hsl(0, 0%, 100%);
      margin-bottom: 6px;
    }

    .profile-card__location {
      font-size: 0.85rem;
      font-weight: 700;
      color: hsl(75, 94%, 57%);
      margin-bottom: 16px;
    }

    .profile-card__bio {
      font-size: 0.875rem;
      color: hsl(0, 0%, 65%);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .profile-card__links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .profile-card__link {
      display: block;
      background-color: hsl(0, 0%, 20%);
      color: hsl(0, 0%, 100%);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px;
      border-radius: 8px;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .profile-card__link:hover {
      background-color: hsl(75, 94%, 57%);
      color: hsl(0, 0%, 0%);
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <img
      class="profile-card__avatar"
      src="/assets/images/avatar-jessica.jpeg"
      alt="Jessica Randall"
    />
    <h1 class="profile-card__name">Jessica Randall</h1>
    <p class="profile-card__location">London, United Kingdom</p>
    <p class="profile-card__bio">"Front-end developer and avid reader."</p>

    <div class="profile-card__links">
      <a href="https://github.com/jessicarandall" class="profile-card__link">GitHub</a>
      <a href="#" class="profile-card__link">Frontend Mentor</a>
      <a href="https://www.linkedin.com/in/jessica-randall" class="profile-card__link">LinkedIn</a>
      <a href="https://twitter.com/jessicarandall" class="profile-card__link">Twitter</a>
      <a href="#" class="profile-card__link">Instagram</a>
    </div>
  </div>

</body>
</html>
