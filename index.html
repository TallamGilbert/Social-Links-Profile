<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Social Links Profile</title>
  
</head>
<body>

  <div class="profile-card">
    <img
      class="profile-card__avatar"
      src="/assets/images/avatar-jessica.jpeg"
      alt="Jessica Randall"
    />
    <h1 class="profile-card__name">Jessica Randall</h1>
    <p class="profile-card__location">London, United Kingdom</p>
    <p class="profile-card__bio">"Front-end developer and avid reader."</p>

    <div class="profile-card__links">
      <a href="https://github.com/jessicarandall" class="profile-card__link">GitHub</a>
      <a href="#" class="profile-card__link">Frontend Mentor</a>
      <a href="https://www.linkedin.com/in/jessica-randall" class="profile-card__link">LinkedIn</a>
      <a href="https://twitter.com/jessicarandall" class="profile-card__link">Twitter</a>
      <a href="#" class="profile-card__link">Instagram</a>
    </div>
  </div>

</body>
</html>
